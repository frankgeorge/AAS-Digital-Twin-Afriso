spring:
  mongodb:
    uri: mongodb://mongoAdmin:mongoPassword@mongo:27017/aasregistry?authSource=admin
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/BaSyx
          jwk-set-uri: http://keycloak:8080/realms/BaSyx/protocol/openid-connect/certs
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
basyx:
  feature:
    authorization:
      enabled: true
      type: rbac
      jwtBearerTokenProvider: keycloak
      rbac:
        file: file:/config/rbac_rules.json
  cors:
    allowed-origins: 'http://localhost:3000'
    allowed-methods: GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD