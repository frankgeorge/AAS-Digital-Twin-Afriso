services:
 
  mongo:
    container_name: mongo
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 256M
    volumes:
      - ./data/mongodb:/data/db
    networks: 
      - backend
    healthcheck:
      test:
        ["CMD", "mongosh", "--username", "mongoAdmin", "--password", "mongoPassword", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  #machine 1 server 
  machine1-aas:
    container_name: machine1-aas
    image:  eclipsebasyx/aas-environment:2.0.0-milestone-05
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m -XX:MaxMetaspaceSize=192m"
      BASYX_CORS_ALLOWED_ORIGINS: "${CORS_ORIGINS}"
      BASYX_CORS_ALLOWED_METHODS: "GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD"
      SPRING_MONGODB_URI: "mongodb://${DB_USER}:${DB_PASSWORD}@mongo:27017/machine1?authSource=admin"
      BASYX_AASREPOSITORY_FEATURE_REGISTRYINTEGRATION: "http://aas-registry:8080"
      BASYX_SUBMODELREPOSITORY_FEATURE_REGISTRYINTEGRATION: "http://submodel-registry:8080"
      BASYX_EXTERNALURL: "http://localhost:8081"
      BASYX_FEATURE_AASREGISTRYINTEGRATION: "true"
      BASYX_FEATURE_SUBMODELREGISTRYINTEGRATION: "true"
    deploy:
      resources:
        limits:
          memory: 1024M
    volumes:
      - ./keycloak/application.properties:/config/application.properties:ro
      - ./keycloak/rbac_rules.json:/config/rbac_rules.json:ro
    depends_on:
      mongo:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks: 
      - backend
      - frontend

  #machine 2 server 
  machine2-aas:
    container_name: machine2-aas
    image: eclipsebasyx/aas-environment:2.0.0-milestone-05
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m -XX:MaxMetaspaceSize=192m"
      BASYX_CORS_ALLOWED_ORIGINS: "${CORS_ORIGINS}"
      BASYX_CORS_ALLOWED_METHODS: "GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD"
      SPRING_MONGODB_URI: "mongodb://${DB_USER}:${DB_PASSWORD}@mongo:27017/machine2?authSource=admin"
      BASYX_AASREPOSITORY_FEATURE_REGISTRYINTEGRATION: "http://aas-registry:8080"
      BASYX_SUBMODELREPOSITORY_FEATURE_REGISTRYINTEGRATION: "http://submodel-registry:8080"
      BASYX_EXTERNALURL: "http://localhost:8082"
      BASYX_FEATURE_AASREGISTRYINTEGRATION: "true"
      BASYX_FEATURE_SUBMODELREGISTRYINTEGRATION: "true"
    deploy:
      resources:
        limits:
          memory: 1024M
    depends_on:
      mongo:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks: 
      - backend
      - frontend
  
  aas-ui:
    container_name: aas-web-ui
    image: eclipsebasyx/aas-gui:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      ENDPOINT_CONFIG_AVAILABLE: "true"
      ALLOW_EDITING: "true"
      ALLOW_UPLOADING: "true"
      ALLOW_LOGOUT: "true"
      SM_VIEWER_EDITOR: "true"
      START_PAGE_ROUTE_NAME: AASEditor
    deploy:
      resources:
        limits:
          memory: 256M
    volumes:
      - ./config/basyx-infra.yml:/basyx-infra.yml:ro
    depends_on:
      machine1-aas:
        condition: service_started
      machine2-aas:
        condition: service_started
    networks: 
      - frontend
  
  aas-registry:
    container_name: aas-registry
    image: eclipsebasyx/aas-registry-log-mongodb:2.0.0-milestone-13
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m -XX:MaxMetaspaceSize=192m"
      SERVER_PORT: 8080
      SPRING_MONGODB_URI: "mongodb://${DB_USER}:${DB_PASSWORD}@mongo:27017/aasregistry?authSource=admin"
      SPRING_MONGODB_HOST: mongo
      SPRING_MONGODB_PORT: 27017
      SPRING_MONGODB_DATABASE: aasregistry
      SPRING_MONGODB_USERNAME: ${DB_USER}
      SPRING_MONGODB_PASSWORD: ${DB_PASSWORD}
      SPRING_MONGODB_AUTHENTICATION_DATABASE: admin
      BASYX_CORS_ALLOWED_ORIGINS: "${CORS_ORIGINS}"
      BASYX_CORS_ALLOWED_METHODS: "GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD"
    deploy:
      resources:
        limits:
          memory: 768M
    volumes:
      - ./keycloak/aas-registry.yml:/config/application.yml:ro
    depends_on:
      mongo:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks: 
      - backend
      - frontend

  submodel-registry:
    container_name: submodel-registry
    image: eclipsebasyx/submodel-registry-log-mongodb:2.0.0-SNAPSHOT
    restart: unless-stopped
    ports:
      - "8084:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m -XX:MaxMetaspaceSize=192m"
      SERVER_PORT: 8080
      SPRING_MONGODB_URI: "mongodb://${DB_USER}:${DB_PASSWORD}@mongo:27017/smregistry?authSource=admin"
      SPRING_MONGODB_HOST: mongo
      SPRING_MONGODB_PORT: 27017
      SPRING_MONGODB_DATABASE: smregistry
      SPRING_MONGODB_USERNAME: ${DB_USER}
      SPRING_MONGODB_PASSWORD: ${DB_PASSWORD}
      SPRING_MONGODB_AUTHENTICATION_DATABASE: admin
      BASYX_CORS_ALLOWED_ORIGINS: "${CORS_ORIGINS}"
      BASYX_CORS_ALLOWED_METHODS: "GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD"
    deploy:
      resources:
        limits:
          memory: 768M
    depends_on:
      mongo:
        condition: service_healthy
    networks: 
      - backend
      - frontend

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    deploy:
      resources:
        limits:
          memory: 128M
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - machine1-aas
      - machine2-aas
    networks: 
      - frontend
      - backend

#keycloak
  keycloak-db:
    container_name: keycloak-db
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 256M
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:24.0.5
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_CACHE: local
      KC_HTTP_ENABLED: "true"
      JAVA_OPTS_KC_HEAP: "-Xms64m -Xmx192m -XX:MaxMetaspaceSize=192m -XX:ReservedCodeCacheSize=64m"
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "9096"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    deploy:
      resources:
        limits:
          memory: 1024M
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "9096:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
  frontend:

volumes:
  keycloak-db-data:
